# DEMO — copie para .github/workflows/rodada.yml no SEU repositório do app.
# Fica fora de .github/ aqui de propósito: não deve disparar no repo de templates.
name: rodada-lembrete

on:
  schedule:
    # 12:00 UTC = 09:00 BR (-03). Ajuste ao seu fuso/horário.
    - cron: "0 12 * * *"
  workflow_dispatch: {}

# Evita loop: o push do estado abaixo não re-dispara (schedule/dispatch só).
permissions:
  contents: write

jobs:
  rodada:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Rodar lembrete
        env:
          PIX_KEY: ${{ secrets.PIX_KEY }}
          RECEBEDOR_NOME: ${{ secrets.RECEBEDOR_NOME }}
          RECEBEDOR_CIDADE: ${{ secrets.RECEBEDOR_CIDADE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIAS_ANTECEDENCIA: ${{ secrets.DIAS_ANTECEDENCIA }}
        run: npm run rodada
      - name: Persistir estado
        # always(): mesmo se a rodada sair ≠ 0 por falha em ALGUM cliente, os que
        # foram cobrados já estão marcados — precisamos commitar pra não recobrar.
        if: always()
        run: |
          git config user.name "rodada-bot"
          git config user.email "bot@users.noreply.github.com"
          git add estado.json
          git diff --staged --quiet || git commit -m "chore: atualiza estado [skip ci]"
          git push
